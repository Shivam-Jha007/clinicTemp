<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Book your clinic appointment online in minutes." />
  <title>BlueWave Clinic | Book Appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="book.html">
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">BlueWave Clinic</a>
      <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">Menu</button>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="book.html">Book</a>
        <a href="contact.html">Contact</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="section page-header">
    <div class="container">
      <h1>Book an Appointment</h1>
      <p>Fill in your details and we will confirm your schedule shortly.</p>

      <form id="bookingForm" class="booking-form" novalidate>
        <div class="form-grid">
          <label>
            Full Name
            <input type="text" id="name" name="name" required />
            <small class="error-text" data-error-for="name"></small>
          </label>

          <label>
            Phone Number
            <input type="tel" id="phone" name="phone" required />
            <small class="error-text" data-error-for="phone"></small>
          </label>

          <label>
            Email
            <input type="email" id="email" name="email" required />
            <small class="error-text" data-error-for="email"></small>
          </label>

          <label>
            Preferred Date
            <input type="date" id="date" name="date" required />
            <small class="error-text" data-error-for="date"></small>
          </label>

          <label>
            Preferred Time
            <input type="time" id="time" name="time" required />
            <small class="error-text" data-error-for="time"></small>
          </label>
        </div>

        <label>
          Reason for Visit
          <textarea id="reason" name="reason" rows="4" required></textarea>
          <small class="error-text" data-error-for="reason"></small>
        </label>

        <button type="submit" id="submitBtn" class="btn btn-primary">Submit Appointment</button>
        <p id="bookingMessage" class="status-message" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <h3>BlueWave Clinic</h3>
        <p>123 Health Avenue, Downtown City</p>
        <p>Phone: +1 555 248 3690</p>
      </div>
      <div>
        <h4>Need Help?</h4>
        <p>Email: care@bluewaveclinic.com</p>
      </div>
    </div>
    <p class="copyright">&copy; <span id="currentYear"></span> BlueWave Clinic. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/booking.js"></script>
</body>
</html>
